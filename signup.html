<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Kano-HoQ Integrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .input-field.is-taken {
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }

        .input-field.is-available {
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .btn-primary {
            background: linear-gradient(to right, #0d9488, #14b8a6);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        <!-- Decoration -->
        <div
            class="absolute -top-10 -left-10 w-40 h-40 bg-teal-500 rounded-full mix-blend-multiply filter blur-2xl opacity-40 animate-pulse">
        </div>
        <div
            class="absolute -bottom-10 -right-10 w-40 h-40 bg-blue-600 rounded-full mix-blend-multiply filter blur-2xl opacity-40">
        </div>

        <div class="text-center mb-8 relative z-10">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 border border-slate-700 mb-4 shadow-lg">
                <i class="fas fa-user-plus text-teal-400 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2">Create Account</h1>
            <p class="text-slate-400 text-sm">Join the QFD System platform</p>
        </div>

        <form id="signupForm" class="space-y-5 relative z-10">
            <div id="errorMsg"
                class="hidden bg-red-500/20 border border-red-500/50 text-red-200 text-sm p-3 rounded-lg text-center">
            </div>

            <!-- Username with live check -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-slate-500"></i>
                    </div>
                    <input type="text" id="username" required minlength="3" autocomplete="off"
                        class="input-field w-full pl-10 pr-10 py-3 rounded-lg" placeholder="johndoe">
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                        <i id="usernameIcon" class="fas fa-spinner fa-spin text-slate-500 hidden text-sm"></i>
                    </div>
                </div>
                <p id="usernameHint" class="text-xs mt-2 text-slate-500">At least 3 characters.</p>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-500"></i>
                    </div>
                    <input type="password" id="password" required minlength="6"
                        class="input-field w-full pl-10 pr-3 py-3 rounded-lg" placeholder="••••••••">
                </div>
                <p class="text-xs text-slate-500 mt-2">Must be at least 6 characters.</p>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-500"></i>
                    </div>
                    <input type="password" id="confirmPassword" required
                        class="input-field w-full pl-10 pr-3 py-3 rounded-lg" placeholder="••••••••">
                </div>
                <p id="confirmHint" class="text-xs mt-2 text-slate-500 hidden"></p>
            </div>

            <button type="submit" id="submitBtn"
                class="btn-primary w-full py-3 rounded-lg font-semibold text-white flex justify-center items-center">
                <span>Sign Up</span>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-400 relative z-10">
            Already have an account?
            <a href="login.html" class="text-teal-400 hover:text-teal-300 font-semibold transition-colors">Sign in</a>
        </div>
    </div>

    <script>
        if (localStorage.getItem('auth_token')) {
            window.location.href = 'index.html';
        }

        let usernameAvailable = null;
        let checkTimeout = null;

        const usernameInput = document.getElementById('username');
        const usernameIcon = document.getElementById('usernameIcon');
        const usernameHint = document.getElementById('usernameHint');
        const confirmInput = document.getElementById('confirmPassword');
        const confirmHint = document.getElementById('confirmHint');

        // Real-time username availability check (debounced)
        usernameInput.addEventListener('input', () => {
            clearTimeout(checkTimeout);
            const val = usernameInput.value.trim();
            usernameAvailable = null;

            usernameInput.classList.remove('is-taken', 'is-available');
            usernameIcon.className = 'fas text-sm hidden';
            usernameHint.textContent = 'At least 3 characters.';
            usernameHint.className = 'text-xs mt-2 text-slate-500';

            if (val.length < 3) return;

            usernameIcon.className = 'fas fa-spinner fa-spin text-slate-400 text-sm';

            checkTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/auth/check?username=${encodeURIComponent(val)}`);
                    const data = await res.json();

                    if (data.exists) {
                        usernameAvailable = false;
                        usernameInput.classList.add('is-taken');
                        usernameIcon.className = 'fas fa-times-circle text-red-400 text-sm';
                        usernameHint.textContent = '✗ This username is already taken.';
                        usernameHint.className = 'text-xs mt-2 text-red-400 font-medium';
                    } else {
                        usernameAvailable = true;
                        usernameInput.classList.add('is-available');
                        usernameIcon.className = 'fas fa-check-circle text-emerald-400 text-sm';
                        usernameHint.textContent = '✓ Username is available!';
                        usernameHint.className = 'text-xs mt-2 text-emerald-400 font-medium';
                    }
                } catch {
                    usernameIcon.className = 'fas text-sm hidden';
                    usernameHint.textContent = 'Could not verify username.';
                }
            }, 500);
        });

        // Confirm password match check
        confirmInput.addEventListener('input', () => {
            const pw = document.getElementById('password').value;
            const conf = confirmInput.value;
            if (!conf) { confirmHint.classList.add('hidden'); return; }
            confirmHint.classList.remove('hidden');
            if (pw === conf) {
                confirmHint.textContent = '✓ Passwords match.';
                confirmHint.className = 'text-xs mt-2 text-emerald-400 font-medium';
            } else {
                confirmHint.textContent = '✗ Passwords do not match.';
                confirmHint.className = 'text-xs mt-2 text-red-400 font-medium';
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const username = usernameInput.value.trim();
            const password = document.getElementById('password').value;
            const confirm = confirmInput.value;

            if (usernameAvailable === false) {
                errorMsg.textContent = 'This username is already taken. Please choose another.';
                errorMsg.classList.remove('hidden');
                return;
            }
            if (password !== confirm) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('username', data.username);
                    window.location.href = 'index.html';
                } else {
                    throw new Error(data.error || 'Registration failed');
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerHTML = '<span>Sign Up</span>';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
